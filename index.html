    for(let d=1;d<=days;d++)cells.push(`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    while(cells.length%7!==0)cells.push(null);
    return cells;
  },[year,month]);

  const weeks=useMemo(()=>{const r=[];for(let i=0;i<calGrid.length;i+=7)r.push(calGrid.slice(i,i+7));return r;},[calGrid]);
  const assignSlots=(multiEvs,week)=>{const se=[];return multiEvs.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(ev=>{let sc=0,ec=6;for(let i=0;i<7;i++){if(week[i]!==null&&week[i]>=ev.date){sc=i;break;}}for(let i=6;i>=0;i--){if(week[i]!==null&&week[i]<=(ev.endDate||ev.date)){ec=i;break;}}let slot=0;while(se[slot]!==undefined&&se[slot]>=sc)slot++;se[slot]=ec;return{ev,sc,ec,slot};});};
  const weekData=useMemo(()=>weeks.map(week=>{const wD=week.filter(d=>d!==null);if(!wD.length)return{assigned:[],nSlots:0};const wS=wD[0],wE=wD[wD.length-1];const mEvs=(filterMember==='all'?events.filter(isMultiD):events.filter(e=>isMultiD(e)&&evMembers(e).includes(filterMember))).filter(ev=>ev.date<=wE&&(ev.endDate||ev.date)>=wS);const assigned=assignSlots(mEvs,week);const nSlots=assigned.length>0?Math.max(...assigned.map(a=>a.slot))+1:0;return{assigned,nSlots};}),[weeks,events,filterMember]);

  const getEvForDate   = date=>{const a=events.filter(ev=>covers(ev,date));return filterMember==='all'?a:a.filter(e=>evMembers(e).includes(filterMember));};
  const getAllEvForDate = date=>events.filter(ev=>covers(ev,date));
  const prev=()=>{if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);};
  const next=()=>{if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);};

  const onCellClick=date=>{
    const evs=getEvForDate(date);
    if(evs.length>0)setDetailPopup({date});
    else setAddModal({date,editEvent:null,defaultMembers:filterMember==='all'?[members[0]?.id]:[filterMember]});
  };
  const onSaveEvent=data=>{
    const isEdit=addModal?.editEvent;
    if(isEdit)setEvents(p=>p.map(e=>e.id===isEdit.id?{...e,...data}:e));
    else setEvents(p=>[...p,{id:Date.now(),...data}]);
    setAddModal(null);
  };
  const onDelete=id=>setEvents(p=>p.filter(e=>e.id!==id));
  const onEditFromDetail=ev=>{setDetailPopup(null);setAddModal({date:ev.date,editEvent:ev,defaultMembers:evMembers(ev)});};
  const onCopyFromDetail=ev=>{setDetailPopup(null);setAddModal({date:ev.date,editEvent:null,copyFrom:ev,defaultMembers:evMembers(ev)});};
  const onAddFromDetail=()=>{const d=detailPopup.date;setDetailPopup(null);setAddModal({date:d,editEvent:null,defaultMembers:filterMember==='all'?[members[0]?.id]:[filterMember]});};

  const onSaveSettings=({members:mb,categories:cats,hospitals:hs,departments:depts})=>{
    const existingIds = new Set(mb.map(m=>m.id));
    // 削除されたメンバーを予定から取り除く（最低1人は残す）
    setEvents(p=>p.map(e=>{
      const kept = evMembers(e).filter(id=>existingIds.has(id));
      return {...e, members: kept.length>0 ? kept : [mb[0]?.id]};
    }));
    setMembers(mb);
    setHospitals(hs);
    setDepartments(depts);
    const catIds=cats.map(c=>c.id);
    setEvents(p=>p.map(e=>catIds.includes(e.category)?e:{...e,category:cats[0]?.id}));
    setCategories(cats);
    // フィルターが削除されたメンバーを指していたらリセット
    if(filterMember!=='all'&&!existingIds.has(filterMember)) setFilterMember('all');
    setShowSettings(false);
  };

  const [isMob, setIsMob] = useState(()=>window.innerWidth<=640);
  useEffect(()=>{const fn=()=>setIsMob(window.innerWidth<=640);window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);},[]);

  const mPfx=`${year}-${String(month+1).padStart(2,'0')}`;
  const mEvs=events.filter(e=>e.date.startsWith(mPfx));
  const cntFor=id=>mEvs.filter(e=>evMembers(e).includes(id)).length;
  const PAGES=[['calendar','📅 カレンダー'],['medical','🏥 通院履歴'],['measurement','📏 身体記録']];

  return (
    <div style={{minHeight:'100vh',padding:isMob?'6px 4px 30px':'16px 13px 40px',maxWidth:'820px',margin:'0 auto'}}>
      {/* Header */}
      <div style={{background:'white',borderRadius:'16px',padding:isMob?'10px 12px':'14px 18px',marginBottom:'8px',boxShadow:'0 4px 24px rgba(180,140,220,0.12)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'6px'}}>
        <div style={{minWidth:0}}>
          <h1 style={{fontSize:isMob?'15px':'18px',fontWeight:'800',color:'#4a3a6a',whiteSpace:'nowrap'}}>🌸 みんなのスケジュール帳</h1>
          {!isMob&&<p style={{fontSize:'12px',color:'#b0a0cc',marginTop:'2px'}}>今月の予定：{mEvs.length}件</p>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'4px',flexShrink:0}}>
          {page==='calendar'&&<>
            <button className="nav-btn" onClick={prev} style={{width:'28px',height:'28px',borderRadius:'8px',border:'none',background:'#f4f0fa',cursor:'pointer',fontSize:'16px',color:'#8070b0',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>‹</button>
            <span style={{fontSize:isMob?'13px':'15px',fontWeight:'700',color:'#4a3a6a',minWidth:isMob?'80px':'100px',textAlign:'center'}}>{isMob?`${MONTH_NAMES[month]}`:`${year}年 ${MONTH_NAMES[month]}`}</span>
            <button className="nav-btn" onClick={next} style={{width:'28px',height:'28px',borderRadius:'8px',border:'none',background:'#f4f0fa',cursor:'pointer',fontSize:'16px',color:'#8070b0',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>›</button>
            <button onClick={()=>{setYear(todayObj.getFullYear());setMonth(todayObj.getMonth());}} style={{padding:'4px 8px',borderRadius:'8px',border:'2px solid #e8d8f8',background:'white',color:'#9080b0',fontSize:'11px',fontWeight:'600',cursor:'pointer'}}>今日</button>
          </>}
          <button onClick={()=>setShowSettings(true)} style={{width:'28px',height:'28px',borderRadius:'8px',border:'2px solid #e8d8f8',background:'white',cursor:'pointer',fontSize:'14px',display:'flex',alignItems:'center',justifyContent:'center',color:'#9080b0',transition:'all 0.15s'}}>⚙️</button>
        </div>
      </div>

      {/* Page Tabs */}
      <div style={{display:'flex',gap:'7px',marginBottom:'11px',background:'white',borderRadius:'16px',padding:'7px',boxShadow:'0 4px 16px rgba(180,140,220,0.10)'}}>
        {PAGES.map(([k,label])=>(
          <button key={k} onClick={()=>setPage(k)}
            style={{flex:1,padding:'9px',borderRadius:'11px',border:'none',background:page===k?'linear-gradient(135deg,#e0b0d4,#b8a0e0)':'transparent',color:page===k?'white':'#a090c0',fontSize:'12px',fontWeight:page===k?'700':'400',cursor:'pointer',boxShadow:page===k?'0 4px 12px rgba(180,130,200,0.32)':'none',transition:'all 0.2s',whiteSpace:'nowrap'}}
          >{label}</button>
        ))}
      </div>

      {/* Member Filter */}
      <div style={{display:'flex',gap:'6px',marginBottom:'11px',background:'white',borderRadius:'16px',padding:isMob?'7px 10px':'10px 13px',boxShadow:'0 4px 16px rgba(180,140,220,0.10)',flexWrap:isMob?'nowrap':'wrap',overflowX:isMob?'auto':'visible',alignItems:'center'}}>
        <span style={{fontSize:'12px',fontWeight:'700',color:'#c0b0d8',marginRight:'2px'}}>表示：</span>
        <button onClick={()=>setFilterMember('all')} style={{padding:'5px 12px',borderRadius:'20px',border:`2px solid ${filterMember==='all'?'#c8a0e8':'transparent'}`,background:filterMember==='all'?'#f0e4fc':'#f4f0fa',color:filterMember==='all'?'#7040c0':'#a0a0c0',fontSize:'12px',fontWeight:filterMember==='all'?'700':'400',cursor:'pointer',transition:'all 0.15s'}}>🌈 全員</button>
        {members.map(mb=>{
          const pal=getPal(members,mb.id); const sel=filterMember===mb.id;
          return <button key={mb.id} onClick={()=>setFilterMember(mb.id)} style={{padding:'5px 12px',borderRadius:'20px',border:`2px solid ${sel?pal.border:'transparent'}`,background:sel?pal.bg:'#f4f0fa',color:sel?pal.text:'#a0a0c0',fontSize:'12px',fontWeight:sel?'700':'400',cursor:'pointer',transition:'all 0.15s',display:'flex',alignItems:'center',gap:'4px'}}><span style={{fontSize:'13px'}}>{mb.emoji}</span>{mb.label}<span style={{fontSize:'10px',opacity:0.7}}>({cntFor(mb.id)})</span></button>;
        })}
      </div>

      {/* Calendar */}
      {page==='calendar'&&(
        <>
          <div style={{background:'white',borderRadius:'20px',overflow:'hidden',boxShadow:'0 4px 24px rgba(180,140,220,0.12)'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,minmax(0,1fr))',borderBottom:'2px solid #f0ecfa'}}>
              {WEEKDAYS.map((w,i)=><div key={w} style={{padding:isMob?'5px 2px':'9px 4px',textAlign:'center',fontSize:isMob?'11px':'13px',fontWeight:'700',color:i===0?'#e07080':i===6?'#8070c8':'#9090b0',background:i===0?'#fff5f6':i===6?'#f8f5ff':'transparent'}}>{w}</div>)}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,minmax(0,1fr))'}}>
              {calGrid.map((date,idx)=>{
                const weekIdx=Math.floor(idx/7);
                const di=idx%7;
                const{assigned,nSlots}=weekData[weekIdx]||{assigned:[],nSlots:0};
                const cellMinH=Math.max(isMob?50:86,(isMob?16:30)+nSlots*(isMob?14:19)+(isMob?28:50));
                if(!date)return<div key={`e${idx}`} style={{minHeight:`${cellMinH}px`,background:'#faf9fd',borderRight:di<6?'1px solid #f0ecfa':'none',borderBottom:'1px solid #f0ecfa',overflow:'hidden'}}/>;
                const vEvs=getEvForDate(date).filter(ev=>!isMultiD(ev));
                const aEvs=getAllEvForDate(date);
                const isToday=date===todayStr,dow=di,isHol=isJPHoliday(date);
                const[,,d]=date.split('-');
                const dotMbs=members.filter(mb=>aEvs.some(e=>evMembers(e).includes(mb.id)));
                const slotItems=[];
                for(let s=0;s<nSlots;s++){
                  const asgn=assigned.find(a=>a.slot===s&&covers(a.ev,date));
                  if(asgn){
                    const{ev,sc,ec}=asgn;
                    const iBS=di===sc,iBE=di===ec;
                    const cat=getCat(categories,ev.category);
                    const emoStr=evMembers(ev).slice(0,2).map(id=>getMb(members,id).emoji).join('');
                    slotItems.push(
                      <div key={`m${ev.id}`} onClick={e=>{e.stopPropagation();onCellClick(date);}}
                        style={{height:isMob?'13px':'17px',flexShrink:0,background:cat.bg,borderTop:`1px solid ${cat.border}`,borderBottom:`1px solid ${cat.border}`,borderLeft:iBS?`3px solid ${cat.border}`:'none',borderRight:iBE?`1px solid ${cat.border}`:'none',borderRadius:`${iBS?'4px':'0'} ${iBE?'4px':'0'} ${iBE?'4px':'0'} ${iBS?'4px':'0'}`,marginLeft:iBS?'0':(isMob?'-2px':'-5px'),marginRight:iBE?'0':(isMob?'-2px':'-5px'),paddingLeft:iBS?'3px':'1px',display:'flex',alignItems:'center',gap:'1px',fontSize:isMob?'8px':'10px',fontWeight:'600',color:cat.text,overflow:'hidden',cursor:'pointer'}}
                      >
                        {iBS&&<><span style={{fontSize:'9px',flexShrink:0}}>{emoStr}</span><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.title}</span></>}
                      </div>
                    );
                  }else{
                    slotItems.push(<div key={`sp${s}`} style={{height:isMob?'13px':'17px',flexShrink:0}}/>);
                  }
                }
                return(
                  <div key={date} className="cell" onClick={()=>onCellClick(date)}
                    style={{minHeight:`${cellMinH}px`,padding:isMob?'3px 2px 3px':'6px 5px 5px',borderRight:dow<6?'1px solid #f0ecfa':'none',borderBottom:'1px solid #f0ecfa',cursor:'pointer',background:isToday?'#fff0f8':(dow===0||isHol)?'#fff8f8':dow===6?'#f8f6ff':'white',transition:'all 0.15s ease',overflow:'hidden',minWidth:0}}
                  >
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'2px',height:isMob?'17px':'22px'}}>
                      <span style={{fontSize:isMob?'10px':'13px',fontWeight:isToday?'800':'500',color:isToday?'white':(dow===0||isHol)?'#e07080':dow===6?'#8070c8':'#5a5a7a',background:isToday?'#d888b8':'transparent',width:isToday?(isMob?'17px':'22px'):'auto',height:isToday?(isMob?'17px':'22px'):'auto',borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',animation:isToday?'pulse 3s infinite':'none',flexShrink:0}}>{+d}</span>
                      {filterMember==='all'&&dotMbs.length>0&&<div style={{display:'flex',gap:'2px'}}>{dotMbs.map(mb=><div key={mb.id} style={{width:'5px',height:'5px',borderRadius:'50%',background:getPal(members,mb.id).accent}}/>)}</div>}
                    </div>
                    {slotItems.length>0&&<div style={{display:'flex',flexDirection:'column',gap:'2px',marginBottom:'2px'}}>{slotItems}</div>}
                    <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
                      {vEvs.slice(0,5).map(ev=>{
                        const mbs=evMembers(ev);const cat=getCat(categories,ev.category);
                        const t=(ev.allDay!==false||!ev.startTime)?null:ev.startTime;
                        const emoStr=mbs.slice(0,2).map(id=>getMb(members,id).emoji).join('');
                        return(
                          <div key={ev.id} style={{background:cat.bg,border:`1px solid ${cat.border}`,borderRadius:'4px',padding:isMob?'1px 2px':'2px 5px',fontSize:isMob?'9px':'10px',fontWeight:'600',color:cat.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'2px'}}>
                            <span style={{fontSize:isMob?'8px':'9px',flexShrink:0}}>{emoStr}</span>
                            {!isMob&&t&&<span style={{flexShrink:0,opacity:0.75}}>{t}</span>}
                            <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{ev.title}</span>
                          </div>
                        );
                      })}
                      {vEvs.length>5&&<div style={{fontSize:'10px',color:'#b0a0cc',fontWeight:'600',paddingLeft:'3px'}}>+{vEvs.length-5} 件</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginTop:'11px',padding:'10px 13px',background:'white',borderRadius:'16px',boxShadow:'0 4px 16px rgba(180,140,220,0.08)',alignItems:'center'}}>
            <span style={{fontSize:'12px',color:'#c0b0d8',fontWeight:'600'}}>カテゴリ：</span>
            {categories.map(cat=><div key={cat.id} style={{display:'flex',alignItems:'center',gap:'4px',padding:'3px 9px',borderRadius:'20px',background:cat.bg,border:`1px solid ${cat.border}`,fontSize:'11px',fontWeight:'600',color:cat.text}}>{cat.emoji} {cat.label}</div>)}
          </div>
          <p style={{textAlign:'center',marginTop:'10px',fontSize:'12px',color:'#c0b0d8'}}>💡 日付をクリックして予定を確認・追加 ／ ⚙️ でメンバー・カテゴリ・病院を管理できます</p>
        </>
      )}

      {page==='medical'&&<MedicalPage events={events} members={members} categories={categories} filterMember={filterMember}/>}
      {page==='measurement'&&<MeasurementPage events={events} members={members} categories={categories} filterMember={filterMember}/>}

      {showSettings&&<SettingsModal members={members} categories={categories} hospitals={hospitals} departments={departments} onSave={onSaveSettings} onClose={()=>setShowSettings(false)}/>}
      {addModal&&<EventModal date={addModal.date} editEvent={addModal.editEvent} copyFrom={addModal.copyFrom} defaultMembers={addModal.defaultMembers} members={members} categories={categories} hospitals={hospitals} departments={departments} onSave={onSaveEvent} onClose={()=>setAddModal(null)}/>}
      {detailPopup&&(
        <DayDetailPopup date={detailPopup.date} events={getAllEvForDate(detailPopup.date)} members={members} categories={categories} filterMember={filterMember}
          onAdd={onAddFromDetail} onEdit={onEditFromDetail} onCopy={onCopyFromDetail}
          onDelete={id=>{onDelete(id);if(getAllEvForDate(detailPopup.date).filter(e=>e.id!==id).length===0)setDetailPopup(null);}}
          onClose={()=>setDetailPopup(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
