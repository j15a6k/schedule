const { useState, useMemo, useRef, useEffect } = React;

  { bg:'#ffecd4', border:'#f0b870', text:'#a06010', accent:'#d89040' }, // オレンジ

const DEFAULT_CATEGORIES = [
  { id:'personal',    label:'プライベート', emoji:'🌸', bg:'#fdd8e8', border:'#f0a0c0', text:'#b0476e', medical:false, measurement:false, bodyCondition:false },
  { id:'work',        label:'仕事・用事',   emoji:'💼', bg:'#d4e8fc', border:'#90c0f0', text:'#3a6ea8', medical:false, measurement:false, bodyCondition:false },
  { id:'hospital',    label:'通院',         emoji:'🏥', bg:'#ffe8cc', border:'#ffb86c', text:'#a05010', medical:true,  measurement:false, bodyCondition:false },
  { id:'medicine',    label:'投薬・検診',   emoji:'💊', bg:'#fff0cc', border:'#ffd060', text:'#907020', medical:true,  measurement:false, bodyCondition:false },
  { id:'measurement', label:'身体測定',     emoji:'📏', bg:'#d8f0fc', border:'#60b8e8', text:'#1a6090', medical:false, measurement:true,  bodyCondition:false },
  { id:'condition',   label:'体調管理',     emoji:'🌡️', bg:'#fce4d8', border:'#e89070', text:'#903020', medical:false, measurement:false, bodyCondition:true  },

  { id:'other',       label:'その他',       emoji:'✨', bg:'#e8d8fc', border:'#c090e8', text:'#6840a0', medical:false, measurement:false, bodyCondition:false },

const DEFAULT_DEPARTMENTS = ['内科','小児科','外科','整形外科','眼科','耳鼻咽喉科','皮膚科','産婦人科','歯科','神経内科'];
const CAT_COLORS = [
  {bg:'#fdd8e8',border:'#f0a0c0',text:'#b0476e'},{bg:'#d4e8fc',border:'#90c0f0',text:'#3a6ea8'},
  {bg:'#ffe8cc',border:'#ffb86c',text:'#a05010'},{bg:'#fff0cc',border:'#ffd060',text:'#907020'},
  {bg:'#d4f5e0',border:'#80d8a8',text:'#2e8a52'},{bg:'#e8f0fc',border:'#a0b8f0',text:'#3050a0'},
  {bg:'#e8d8fc',border:'#c090e8',text:'#6840a0'},{bg:'#fce8d8',border:'#f0b090',text:'#a04010'},
  {bg:'#d8f0fc',border:'#60b8e8',text:'#1a6090'},{bg:'#fce4d8',border:'#e89070',text:'#903020'},
];
const EMOJI_LIST = [
  '🧑','👩','👨','🧒','👧','👦','👶','🧔','👩‍🦰','👩‍🦱',
  '😊','😄','🥰','😎','🤓','🤗','😇','🌟','💫','⭐','🌈',
  '🐱','🐶','🐼','🐨','🐸','🦊','🐻','🐰','🦁','🐮',
  '🌸','🌺','🌻','🌷','🍀','🌙','🌞','🎀','💎','🎵','🎨',
  '🏥','💊','🩺','💉','🩹','📏','⚖️','🌡️','🏃','🧘','🍎','🥗',
  '🎓','📚','💼','🏠','🚗','✈️','🎉','🎁','🍰','☕','⚽','🎮','🛁',
];
const WEEKDAYS    = ['日','月','火','水','木','金','土'];
const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

const todayObj = new Date();
const todayStr = `${todayObj.getFullYear()}-${String(todayObj.getMonth()+1).padStart(2,'0')}-${String(todayObj.getDate()).padStart(2,'0')}`;

/* ═══════════════════════ LOCAL STORAGE ═══════════════════════ */
const LS = {
  get: (key, fallback) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  },
  set: (key, val) => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  },
  exportAll: () => {
    try {
      const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        events:      JSON.parse(localStorage.getItem('sched_events')      || '[]'),
        members:     JSON.parse(localStorage.getItem('sched_members')     || '[]'),
        categories:  JSON.parse(localStorage.getItem('sched_categories')  || '[]'),
        hospitals:   JSON.parse(localStorage.getItem('sched_hospitals')   || '[]'),
        departments: JSON.parse(localStorage.getItem('sched_departments') || '[]'),
      };
      return JSON.stringify(data, null, 2);
    } catch { return ''; }
  },
  importAll: (jsonStr) => {
    try {
      const data = JSON.parse(jsonStr);
      if (!data.version) return { ok: false, msg: '形式が正しくありません' };
      if (data.events)      localStorage.setItem('sched_events',      JSON.stringify(data.events));
      if (data.members)     localStorage.setItem('sched_members',     JSON.stringify(data.members));
      if (data.categories)  localStorage.setItem('sched_categories',  JSON.stringify(data.categories));
      if (data.hospitals)   localStorage.setItem('sched_hospitals',   JSON.stringify(data.hospitals));
      if (data.departments) localStorage.setItem('sched_departments', JSON.stringify(data.departments));
      return { ok: true };
    } catch { return { ok: false, msg: 'JSONの解析に失敗しました' }; }
  },
};

/* ═══════════════════════ HELPERS ═══════════════════════ */
// members配列とidからパレットを取得
const getPal    = (members, id) => {
  const mb = members.find(m=>m.id===id);
  const idx = mb?.paletteIdx ?? 0;
  return MEMBER_PALETTES[idx % MEMBER_PALETTES.length] ?? MEMBER_PALETTES[0];
};
const getMb     = (mbs,id) => mbs.find(m=>m.id===id) ?? mbs[0];
const getCat    = (cats,id)=> cats.find(c=>c.id===id) ?? {id:'?',label:'不明',emoji:'❓',bg:'#f0f0f0',border:'#c0c0c0',text:'#606060',medical:false,measurement:false,bodyCondition:false};
const fmtDate   = s    => { if(!s)return''; const[,m,d]=s.split('-'); return `${+m}月${+d}日`; };
const isMultiD  = ev   => ev.endDate && ev.endDate > ev.date;
const covers    = (ev,date)=>{ const end=(ev.endDate&&ev.endDate>=ev.date)?ev.endDate:ev.date; return date>=ev.date&&date<=end; };
const timeLabel = ev   => (ev.allDay!==false||!ev.startTime)?'終日':ev.endTime?`${ev.startTime}〜${ev.endTime}`:ev.startTime;
const evMembers = ev   => ev.members ?? (ev.member?[ev.member]:[DEFAULT_MEMBERS[0].id]);

/* ─── 日本の祝日判定 ─── */
const JP_HOL=(()=>{
  const cache={};
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const nthMon=(y,m,n)=>{let d=new Date(y,m-1,1),c=0;while(true){if(d.getDay()===1){c++;if(c===n)return d.getDate();}d.setDate(d.getDate()+1);}};
  return year=>{
    if(cache[year])return cache[year];
    const H=new Set();
    const a=(m,d)=>H.add(`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    a(1,1);                    // 元日
    a(2,11);                   // 建国記念の日
    if(year>=2020)a(2,23);     // 天皇誕生日
    a(3,Math.floor(20.8431+0.242194*(year-1980)-Math.floor((year-1980)/4))); // 春分の日
    a(4,29);                   // 昭和の日
    a(5,3);a(5,4);a(5,5);      // 憲法記念日・みどりの日・こどもの日
    a(7,nthMon(year,7,3));     // 海の日（7月第3月曜）
    if(year>=2016)a(8,11);     // 山の日
    a(9,nthMon(year,9,3));     // 敬老の日（9月第3月曜）
    a(9,Math.floor(23.2488+0.242194*(year-1980)-Math.floor((year-1980)/4))); // 秋分の日
    a(10,nthMon(year,10,2));   // スポーツの日（10月第2月曜）
    a(11,3);a(11,23);          // 文化の日・勤労感謝の日
    // 国民の祝日（祝日に挟まれた平日）
    for(const h of [...H].sort()){
      const d2=new Date(h),d3=new Date(h);
      d2.setDate(d2.getDate()+1);d3.setDate(d3.getDate()+2);
      const s2=fmt(d2),s3=fmt(d3);
      if(H.has(s3)&&!H.has(s2)&&d2.getDay()!==0)H.add(s2);
    }
    // 振替休日（日曜の祝日→翌平日）
    const subs=new Set();
    for(const h of [...H].sort()){
      if(new Date(h).getDay()===0){
        let next=new Date(h);
        do{next.setDate(next.getDate()+1);}while(H.has(fmt(next))||subs.has(fmt(next)));
        subs.add(fmt(next));
      }
    }
    subs.forEach(d=>H.add(d));
    cache[year]=H;return H;
  };
})();
const isJPHoliday=dateStr=>JP_HOL(parseInt(dateStr.slice(0,4))).has(dateStr);

/* ═══════════════════════ SHARED STYLES ═══════════════════════ */
const baseInput = {
  width:'100%', padding:'8px 12px', borderRadius:'10px',
  border:'1.5px solid #e0d8f4', fontSize:'14px', color:'#4a3a6a',
  outline:'none', background:'white',
};

/* ═══════════════════════ EMOJI PICKER ═══════════════════════ */
function EmojiPicker({ onSelect, onClose }) {
  return (
    <div style={{padding:'10px',background:'#faf8ff',border:'1.5px solid #e8d8f8',borderRadius:'12px',marginTop:'8px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(8,1fr)',gap:'4px',maxHeight:'110px',overflowY:'auto'}}>
        {EMOJI_LIST.map(em=>(
          <button key={em} className="emoji-btn" onClick={()=>onSelect(em)}
            style={{fontSize:'19px',background:'white',border:'1px solid #ede8f8',borderRadius:'7px',padding:'3px',cursor:'pointer',lineHeight:1,transition:'transform 0.1s'}}
          >{em}</button>
        ))}
      </div>
      <button onClick={onClose} style={{marginTop:'7px',fontSize:'12px',color:'#a090c0',background:'none',border:'none',cursor:'pointer'}}>✕ 閉じる</button>
    </div>
  );
}

/* ═══════════════════════ SETTINGS MODAL ═══════════════════════ */
function SettingsModal({ members, categories, hospitals, departments, onSave, onClose }) {
  const [tab,       setTab]       = useState('members');
  const [draftMb,   setDraftMb]   = useState(members.map(m=>({...m})));
  const [draftCat,  setDraftCat]  = useState(categories.map(c=>({...c})));
  const [draftHosp, setDraftHosp] = useState([...hospitals]);
  const [draftDept, setDraftDept] = useState([...departments]);
  const [emojiFor,  setEmojiFor]  = useState(null);
  const [newHosp,   setNewHosp]   = useState('');
  const [newDept,   setNewDept]   = useState('');
  const [importText,  setImportText]  = useState('');
  const [importMsg,   setImportMsg]   = useState(null);
  const [exportDone,  setExportDone]  = useState(false);

  const updMb  = (i,f,v) => setDraftMb(p=>p.map((m,x)=>x===i?{...m,[f]:v}:m));
  const updCat = (i,f,v) => setDraftCat(p=>p.map((c,x)=>x===i?{...c,[f]:v}:c));
  const setCatCol=(i,col)=> setDraftCat(p=>p.map((c,x)=>x===i?{...c,...col}:c));
  const delCat = i => { if(draftCat.length>1) setDraftCat(p=>p.filter((_,x)=>x!==i)); };
  const addCat = () => {
    const col=CAT_COLORS[draftCat.length%CAT_COLORS.length];
    setDraftCat(p=>[...p,{id:`cat_${Date.now()}`,label:'新しいカテゴリ',emoji:'✨',...col,medical:false,measurement:false,bodyCondition:false}]);
  };
  const moveCat=(i,dir)=>{
    setDraftCat(p=>{ const a=[...p],j=i+dir; if(j<0||j>=a.length)return a; [a[i],a[j]]=[a[j],a[i]]; return a; });
  };

  // メンバー追加・削除
  const addMb = () => {
    const usedIdx = new Set(draftMb.map(m=>m.paletteIdx??0));
    let nextIdx = 0;
    while (usedIdx.has(nextIdx) && nextIdx < MEMBER_PALETTES.length) nextIdx++;
    if (nextIdx >= MEMBER_PALETTES.length) nextIdx = draftMb.length % MEMBER_PALETTES.length;
    setDraftMb(p=>[...p,{id:`mb_${Date.now()}`,label:'新しいメンバー',emoji:'🧒',paletteIdx:nextIdx}]);
  };
  const delMb = i => {
    if (draftMb.length > 1) setDraftMb(p=>p.filter((_,x)=>x!==i));
  };
  const setPalette = (i, idx) => updMb(i, 'paletteIdx', idx);

  const addHosp=()=>{ if(newHosp.trim()&&!draftHosp.includes(newHosp.trim())){setDraftHosp(p=>[...p,newHosp.trim()]);setNewHosp('');} };
  const addDept=()=>{ if(newDept.trim()&&!draftDept.includes(newDept.trim())){setDraftDept(p=>[...p,newDept.trim()]);setNewDept('');} };
  const toggleEmoji=(kind,index)=>setEmojiFor(p=>p?.kind===kind&&p?.index===index?null:{kind,index});

  const handleExport = () => {
    const json = LS.exportAll();
    const blob = new Blob([json], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=`schedule-backup-${todayStr}.json`; a.click();
    URL.revokeObjectURL(url);
    setExportDone(true); setTimeout(()=>setExportDone(false),3000);
  };
  const handleImport = () => {
    const result = LS.importAll(importText);
    if (result.ok) {
      setImportMsg({ok:true,text:'インポート成功！ページをリロードします…'});
      setTimeout(()=>window.location.reload(),1500);
    } else {
      setImportMsg({ok:false,text:result.msg});
    }
  };

  const TABS = [['members','👥 メンバー'],['categories','🏷️ カテゴリ'],['medical','🏥 病院・診察科'],['data','💾 データ共有']];

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:1100,background:'rgba(180,160,220,0.28)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',overflowY:'auto'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:'24px',padding:'24px',width:'100%',maxWidth:'480px',boxShadow:'0 20px 60px rgba(140,100,200,0.22)',animation:'slideUp 0.22s ease',maxHeight:'90vh',overflowY:'auto'}}>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px'}}>
          <h2 style={{fontSize:'18px',fontWeight:'800',color:'#4a3a6a'}}>⚙️ 設定</h2>
          <button onClick={onClose} style={{width:'30px',height:'30px',borderRadius:'50%',border:'none',background:'#f0ecfa',cursor:'pointer',fontSize:'14px',color:'#9080b0'}}>✕</button>
        </div>

        {/* Tabs */}
        <div style={{display:'flex',gap:'4px',marginBottom:'16px',background:'#f4f0fa',borderRadius:'12px',padding:'4px',flexWrap:'wrap'}}>
          {TABS.map(([k,label])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,minWidth:'64px',padding:'7px 3px',borderRadius:'9px',border:'none',background:tab===k?'white':'transparent',color:tab===k?'#6040a0':'#a090c0',fontSize:'11px',fontWeight:tab===k?'700':'400',cursor:'pointer',boxShadow:tab===k?'0 2px 8px rgba(180,140,220,0.2)':'none',transition:'all 0.15s',whiteSpace:'nowrap'}}>{label}</button>
          ))}
        </div>

        {/* ── Members Tab ── */}
        {tab==='members' && (
          <div style={{display:'flex',flexDirection:'column',gap:'11px'}}>
            <p style={{fontSize:'12px',color:'#b0a0cc'}}>メンバーの名前・絵文字・カラーを変更できます</p>
            {draftMb.map((mb,i)=>{
              const pal=MEMBER_PALETTES[mb.paletteIdx%MEMBER_PALETTES.length]??MEMBER_PALETTES[0];
              const open=emojiFor?.kind==='mb'&&emojiFor?.index===i;
              return (
                <div key={mb.id} style={{padding:'12px',borderRadius:'14px',background:pal.bg,border:`1.5px solid ${pal.border}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:'9px'}}>
                    <button onClick={()=>toggleEmoji('mb',i)} style={{fontSize:'23px',background:'white',border:`1.5px solid ${pal.border}`,borderRadius:'10px',width:'40px',height:'40px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{mb.emoji}</button>
                    <input type="text" value={mb.label} maxLength={10} onChange={e=>updMb(i,'label',e.target.value)}
                      style={{flex:1,padding:'8px 11px',borderRadius:'10px',border:`1.5px solid ${pal.border}`,background:'white',fontSize:'15px',fontWeight:'600',color:pal.text,outline:'none'}}
                      onFocus={e=>e.target.style.borderWidth='2px'} onBlur={e=>e.target.style.borderWidth='1.5px'}
                    />
                    {draftMb.length>1 && (
                      <button onClick={()=>delMb(i)} style={{width:'30px',height:'30px',borderRadius:'8px',border:'none',background:'rgba(255,255,255,0.75)',cursor:'pointer',fontSize:'14px',color:'#c06060',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}} title="削除">🗑</button>
                    )}
                  </div>
                  {/* Palette swatches */}
                  <div style={{display:'flex',gap:'6px',marginTop:'9px',flexWrap:'wrap',alignItems:'center'}}>
                    <span style={{fontSize:'11px',color:pal.text,fontWeight:'600',opacity:0.8}}>カラー：</span>
                    {MEMBER_PALETTES.map((p,pi)=>(
                      <div key={pi} onClick={()=>setPalette(i,pi)} className="swatch"
                        style={{width:'20px',height:'20px',borderRadius:'50%',background:p.bg,border:(mb.paletteIdx??0)===pi?`3px solid ${p.text}`:`2px solid ${p.border}`,cursor:'pointer',transition:'transform 0.1s',flexShrink:0}}
                      />
                    ))}
                  </div>
                  {open && <EmojiPicker onSelect={em=>{updMb(i,'emoji',em);setEmojiFor(null);}} onClose={()=>setEmojiFor(null)}/>}
                </div>
              );
            })}
            <button onClick={addMb} style={{padding:'11px',borderRadius:'12px',border:'2px dashed #d8c8f0',background:'white',color:'#9080b0',fontSize:'14px',fontWeight:'600',cursor:'pointer'}}>＋ メンバーを追加</button>
          </div>
        )}

        {/* ── Categories Tab ── */}
        {tab==='categories' && (
          <div style={{display:'flex',flexDirection:'column',gap:'9px'}}>
            <p style={{fontSize:'12px',color:'#b0a0cc',marginBottom:'2px'}}>▲▼ で順番を変更できます</p>
            {draftCat.map((cat,i)=>{
              const open=emojiFor?.kind==='cat'&&emojiFor?.index===i;
              return (
                <div key={cat.id} style={{padding:'10px 11px',borderRadius:'12px',background:cat.bg,border:`1.5px solid ${cat.border}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                    <button onClick={()=>toggleEmoji('cat',i)} style={{fontSize:'19px',background:'white',border:`1.5px solid ${cat.border}`,borderRadius:'8px',width:'34px',height:'34px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{cat.emoji}</button>
                    <input type="text" value={cat.label} maxLength={12} onChange={e=>updCat(i,'label',e.target.value)}
                      style={{flex:1,padding:'7px 10px',borderRadius:'8px',border:`1.5px solid ${cat.border}`,background:'white',fontSize:'14px',fontWeight:'600',color:cat.text,outline:'none'}}
                      onFocus={e=>e.target.style.borderWidth='2px'} onBlur={e=>e.target.style.borderWidth='1.5px'}
                    />
                    <div style={{display:'flex',flexDirection:'column',gap:'2px',flexShrink:0}}>
                      <button onClick={()=>moveCat(i,-1)} disabled={i===0} className="move-btn"
                        style={{width:'22px',height:'22px',borderRadius:'5px',border:'none',background:i===0?'transparent':'rgba(255,255,255,0.8)',cursor:i===0?'default':'pointer',fontSize:'11px',color:i===0?'transparent':cat.text,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>▲</button>
                      <button onClick={()=>moveCat(i,+1)} disabled={i===draftCat.length-1} className="move-btn"
                        style={{width:'22px',height:'22px',borderRadius:'5px',border:'none',background:i===draftCat.length-1?'transparent':'rgba(255,255,255,0.8)',cursor:i===draftCat.length-1?'default':'pointer',fontSize:'11px',color:i===draftCat.length-1?'transparent':cat.text,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>▼</button>
                    </div>
                    {draftCat.length>1 && <button onClick={()=>delCat(i)} style={{width:'27px',height:'27px',borderRadius:'7px',border:'none',background:'rgba(255,255,255,0.75)',cursor:'pointer',fontSize:'13px',color:'#c06060',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>🗑</button>}
                  </div>
                  <div style={{display:'flex',gap:'5px',marginTop:'7px',flexWrap:'wrap'}}>
                    {CAT_COLORS.map((col,ci)=>(
                      <div key={ci} className="swatch" onClick={()=>setCatCol(i,col)}
                        style={{width:'18px',height:'18px',borderRadius:'50%',background:col.bg,border:cat.bg===col.bg?`3px solid ${col.text}`:`2px solid ${col.border}`,cursor:'pointer',transition:'transform 0.1s',flexShrink:0}}
                      />
                    ))}
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:'4px',marginTop:'7px'}}>
                    <button onClick={()=>updCat(i,'medical',!cat.medical)}
                      style={{width:'100%',padding:'5px 10px',borderRadius:'8px',border:'none',background:cat.medical?'rgba(255,230,200,0.8)':'rgba(255,255,255,0.5)',color:cat.medical?'#a05010':'#b0a0c0',fontSize:'12px',fontWeight:cat.medical?'600':'400',cursor:'pointer',textAlign:'left',transition:'all 0.15s'}}
                    >{cat.medical?'🏥 通院記録フォームを使用中':'○ 通院記録フォームを使う'}</button>
                    <button onClick={()=>updCat(i,'measurement',!cat.measurement)}
                      style={{width:'100%',padding:'5px 10px',borderRadius:'8px',border:'none',background:cat.measurement?'rgba(200,230,255,0.8)':'rgba(255,255,255,0.5)',color:cat.measurement?'#1a6090':'#b0a0c0',fontSize:'12px',fontWeight:cat.measurement?'600':'400',cursor:'pointer',textAlign:'left',transition:'all 0.15s'}}
                    >{cat.measurement?'📏 身体測定フォームを使用中':'○ 身体測定フォームを使う'}</button>
                    <button onClick={()=>updCat(i,'bodyCondition',!cat.bodyCondition)}
                      style={{width:'100%',padding:'5px 10px',borderRadius:'8px',border:'none',background:cat.bodyCondition?'rgba(255,210,190,0.8)':'rgba(255,255,255,0.5)',color:cat.bodyCondition?'#903020':'#b0a0c0',fontSize:'12px',fontWeight:cat.bodyCondition?'600':'400',cursor:'pointer',textAlign:'left',transition:'all 0.15s'}}
                    >{cat.bodyCondition?'🌡️ 体調管理フォームを使用中':'○ 体調管理フォームを使う'}</button>
                  </div>
                  {open && <EmojiPicker onSelect={em=>{updCat(i,'emoji',em);setEmojiFor(null);}} onClose={()=>setEmojiFor(null)}/>}
                </div>
              );
            })}
            <button onClick={addCat} style={{padding:'11px',borderRadius:'12px',border:'2px dashed #d8c8f0',background:'white',color:'#9080b0',fontSize:'14px',fontWeight:'600',cursor:'pointer'}}>＋ カテゴリを追加</button>
          </div>
        )}

        {/* ── Medical Tab ── */}
        {tab==='medical' && (
          <div style={{display:'flex',flexDirection:'column',gap:'18px'}}>
            <div>
              <p style={{fontSize:'14px',fontWeight:'700',color:'#a05010',marginBottom:'10px'}}>🏥 病院リスト</p>
              <div style={{display:'flex',gap:'6px',marginBottom:'8px'}}>
                <input type="text" value={newHosp} onChange={e=>setNewHosp(e.target.value)} placeholder="病院名を入力（例：○○クリニック）"
                  onKeyDown={e=>e.key==='Enter'&&(e.preventDefault(),addHosp())}
                  style={{...baseInput,flex:1,padding:'8px 12px'}}
                  onFocus={e=>e.target.style.borderColor='#ffb86c'} onBlur={e=>e.target.style.borderColor='#e0d8f4'}
                />
                <button onClick={addHosp} style={{padding:'8px 14px',borderRadius:'10px',border:'none',background:'#ffe8cc',color:'#a05010',fontWeight:'700',cursor:'pointer',fontSize:'14px',flexShrink:0}}>＋追加</button>
              </div>
              {draftHosp.length===0 ? (
                <p style={{fontSize:'13px',color:'#c0b0c8',textAlign:'center',padding:'12px',background:'#faf8ff',borderRadius:'10px'}}>まだ病院が登録されていません</p>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:'5px',maxHeight:'180px',overflowY:'auto'}}>
                  {draftHosp.map((h,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',borderRadius:'9px',background:'#fff8f0',border:'1px solid #ffcc90'}}>
                      <span style={{fontSize:'14px',color:'#804010',fontWeight:'500'}}>🏥 {h}</span>
                      <button onClick={()=>setDraftHosp(p=>p.filter((_,x)=>x!==i))} style={{background:'rgba(255,200,150,0.4)',border:'none',borderRadius:'6px',width:'24px',height:'24px',cursor:'pointer',fontSize:'12px',color:'#c06040',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div style={{height:'1px',background:'#f0e8f8'}}/>
            <div>
              <p style={{fontSize:'14px',fontWeight:'700',color:'#907020',marginBottom:'10px'}}>🩺 診察科リスト</p>
              <div style={{display:'flex',gap:'6px',marginBottom:'8px'}}>
                <input type="text" value={newDept} onChange={e=>setNewDept(e.target.value)} placeholder="診察科を入力（例：アレルギー科）"
                  onKeyDown={e=>e.key==='Enter'&&(e.preventDefault(),addDept())}
                  style={{...baseInput,flex:1,padding:'8px 12px'}}
                  onFocus={e=>e.target.style.borderColor='#ffd060'} onBlur={e=>e.target.style.borderColor='#e0d8f4'}
                />
                <button onClick={addDept} style={{padding:'8px 14px',borderRadius:'10px',border:'none',background:'#fff4cc',color:'#907020',fontWeight:'700',cursor:'pointer',fontSize:'14px',flexShrink:0}}>＋追加</button>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'6px',maxHeight:'160px',overflowY:'auto'}}>
                {draftDept.map((d,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:'5px',padding:'5px 10px',borderRadius:'20px',background:'#fffae0',border:'1px solid #e8d060'}}>
                    <span style={{fontSize:'13px',color:'#706010',fontWeight:'500'}}>🩺 {d}</span>
                    <button onClick={()=>setDraftDept(p=>p.filter((_,x)=>x!==i))} style={{background:'rgba(220,190,50,0.2)',border:'none',borderRadius:'50%',width:'18px',height:'18px',cursor:'pointer',fontSize:'11px',color:'#908020',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── Data Tab ── */}
        {tab==='data' && (
          <div style={{display:'flex',flexDirection:'column',gap:'18px'}}>
            <div style={{padding:'16px',borderRadius:'14px',background:'#f0f8ff',border:'1.5px solid #90c8f0'}}>
              <p style={{fontSize:'14px',fontWeight:'700',color:'#1a6090',marginBottom:'6px'}}>📤 データをエクスポート</p>
              <p style={{fontSize:'12px',color:'#6090b0',marginBottom:'12px',lineHeight:1.6}}>全データをJSONファイルとしてダウンロードします。別のデバイスでインポートすることでデータを同期できます。</p>
              <button onClick={handleExport}
                style={{width:'100%',padding:'11px',borderRadius:'11px',border:'none',background:exportDone?'#60b060':'linear-gradient(135deg,#60b0e8,#4090d0)',color:'white',fontSize:'14px',fontWeight:'700',cursor:'pointer',transition:'all 0.2s'}}>
                {exportDone?'✅ ダウンロード完了！':'⬇️ バックアップファイルをダウンロード'}
              </button>
            </div>
            <div style={{height:'1px',background:'#e8e0f8'}}/>
            <div style={{padding:'16px',borderRadius:'14px',background:'#fff8f0',border:'1.5px solid #f0b060'}}>
              <p style={{fontSize:'14px',fontWeight:'700',color:'#a05010',marginBottom:'6px'}}>📥 データをインポート</p>
              <p style={{fontSize:'12px',color:'#b08040',marginBottom:'10px',lineHeight:1.6}}>バックアップJSONの内容を貼り付けてインポートします。現在のデータは上書きされます。</p>
              <textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={5}
                placeholder='バックアップファイルの内容（JSON）をここに貼り付けてください…'
                style={{width:'100%',padding:'10px',borderRadius:'10px',border:'1.5px solid #e0c8a0',fontSize:'12px',color:'#604020',resize:'vertical',fontFamily:'monospace',background:'white',outline:'none'}}
              />
              {importMsg && (
                <p style={{fontSize:'12px',fontWeight:'600',color:importMsg.ok?'#208040':'#c03030',marginTop:'6px',padding:'7px 10px',borderRadius:'8px',background:importMsg.ok?'#e8f8e8':'#fce8e8'}}>
                  {importMsg.ok?'✅':'❌'} {importMsg.text}
                </p>
              )}
              <button onClick={handleImport} disabled={!importText.trim()}
                style={{width:'100%',marginTop:'10px',padding:'11px',borderRadius:'11px',border:'none',background:importText.trim()?'linear-gradient(135deg,#f0b060,#e08840)':'#e0d8c8',color:importText.trim()?'white':'#b0a080',fontSize:'14px',fontWeight:'700',cursor:importText.trim()?'pointer':'default',transition:'all 0.2s'}}>
                ⬆️ インポートして上書き
              </button>
            </div>
            <div style={{padding:'12px',borderRadius:'12px',background:'#f8f4ff',border:'1px solid #d8c8f0'}}>
              <p style={{fontSize:'12px',color:'#8060a0',lineHeight:1.7}}>
                💡 <b>デバイス間の同期方法：</b><br/>
                ① MacBook でエクスポート → JSONファイルをiCloudに保存<br/>
                ② iPhoneの「ファイル」アプリでJSONを開いて内容をコピー<br/>
                ③ iPhoneのアプリ → 設定 → データ共有 → インポートに貼り付け
              </p>
            </div>
          </div>
        )}

        {tab !== 'data' && (
          <div style={{display:'flex',gap:'10px',marginTop:'20px'}}>
            <button onClick={onClose} style={{flex:1,padding:'12px',borderRadius:'12px',border:'2px solid #ede8f8',background:'white',color:'#a090c0',fontSize:'14px',fontWeight:'600',cursor:'pointer'}}>キャンセル</button>
            <button onClick={()=>onSave({members:draftMb,categories:draftCat,hospitals:draftHosp,departments:draftDept})}
              style={{flex:2,padding:'12px',borderRadius:'12px',border:'none',background:'linear-gradient(135deg,#c8a0e8,#e8b8d8)',color:'white',fontSize:'14px',fontWeight:'700',cursor:'pointer',boxShadow:'0 4px 16px rgba(200,140,220,0.3)'}}>💾 保存する</button>
          </div>
        )}
        {tab==='data' && (
          <div style={{marginTop:'20px'}}>
            <button onClick={onClose} style={{width:'100%',padding:'12px',borderRadius:'12px',border:'2px solid #ede8f8',background:'white',color:'#a090c0',fontSize:'14px',fontWeight:'600',cursor:'pointer'}}>閉じる</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════ EVENT MODAL ═══════════════════════ */
function EventModal({ date, editEvent, copyFrom, defaultMembers, members, categories, hospitals, departments, onSave, onClose }) {
  const isEdit = !!editEvent;
  const isCopy = !!copyFrom;
  const src = editEvent || copyFrom;
  const [startDate,  setStartDate]  = useState(src?.date ?? date);
  const [title,      setTitle]      = useState(src?.title     ?? '');
  const [selMembers, setSelMembers] = useState(src ? evMembers(src) : (defaultMembers ?? [members[0]?.id]));
  const [category,   setCategory]   = useState(src?.category  ?? categories[0]?.id);
  const [memo,       setMemo]       = useState(src?.memo      ?? '');
  const [allDay,     setAllDay]     = useState(src?(src.allDay!==false):true);
  const [startTime,  setStartTime]  = useState(src?.startTime ?? '09:00');
  const [endTime,    setEndTime]    = useState(src?.endTime   ?? '10:00');
  const [multiDay,   setMultiDay]   = useState(src?isMultiD(src):false);
  const [endDate,    setEndDate]    = useState(src?.endDate>src?.date?src.endDate:date);
  const [hospital,       setHospital]       = useState(src?.hospital       ?? '');
  const [department,     setDepartment]     = useState(src?.department     ?? '');
  const [medResult,      setMedResult]      = useState(src?.medResult      ?? '');
  const [height,         setHeight]         = useState(src?.height         ?? '');
  const [weight,         setWeight]         = useState(src?.weight         ?? '');
  const [conditionDetail,setConditionDetail]= useState(src?.conditionDetail?? '');

  const inputRef = useRef(null);
  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),50);},[]);

  const [y,m,d] = startDate.split('-');
  const wday = WEEKDAYS[new Date(+y,+m-1,+d).getDay()];
  const pal  = getPal(members, selMembers[0] ?? members[0]?.id);

  const currentCat    = categories.find(c=>c.id===category) ?? {};
  const isMedical     = currentCat.medical      === true;
  const isMeasurement = currentCat.measurement  === true;
  const isCondition   = currentCat.bodyCondition=== true;

  const toggleMember = id => {
    setSelMembers(prev=>prev.includes(id)?(prev.length>1?prev.filter(x=>x!==id):prev):[...prev,id]);
  };

  const handleSubmit = e => {
    e.preventDefault();
    if (!title.trim()) return;
    onSave({
      title:title.trim(), members:selMembers, category, memo,
      date:startDate, endDate:multiDay&&endDate>startDate?endDate:startDate,
      allDay, startTime:allDay?'':startTime, endTime:allDay?'':endTime,
      hospital:        isMedical?hospital:'',
      department:      isMedical?department:'',
      medResult:       isMedical?medResult:'',
      height:          isMeasurement?height:'',
      weight:          isMeasurement?weight:'',
      conditionDetail: isCondition?conditionDetail:'',
    });
  };

  const selStyle={width:'100%',padding:'8px 12px',borderRadius:'10px',border:'1.5px solid #e0d8f4',fontSize:'14px',color:'#4a3a6a',outline:'none',background:'white',cursor:'pointer'};

  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(180,160,220,0.25)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',overflowY:'auto'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:'24px',padding:'24px',width:'100%',maxWidth:'440px',boxShadow:'0 20px 60px rgba(140,100,200,0.22)',animation:'slideUp 0.22s ease',margin:'auto',maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px'}}>
          <div>
            <h2 style={{fontSize:'17px',fontWeight:'800',color:'#4a3a6a'}}>{isEdit?'予定を編集':isCopy?'📋 予定をコピー':'予定を追加'}</h2>
            <p style={{fontSize:'13px',color:'#b0a0cc',marginTop:'2px'}}>📅 {+m}月{+d}日（{wday}）</p>
          </div>
          <button onClick={onClose} style={{width:'30px',height:'30px',borderRadius:'50%',border:'none',background:'#f0ecfa',cursor:'pointer',fontSize:'14px',color:'#9080b0'}}>✕</button>
        </div>

        <form onSubmit={handleSubmit}>
          <input ref={inputRef} type="text" placeholder="予定のタイトル" value={title} onChange={e=>setTitle(e.target.value)}
            style={{width:'100%',padding:'12px 14px',borderRadius:'12px',border:'2px solid #ede8f8',fontSize:'15px',color:'#4a3a6a',outline:'none',background:'#faf8ff',marginBottom:'12px'}}
            onFocus={e=>e.target.style.borderColor='#c8a0e8'} onBlur={e=>e.target.style.borderColor='#ede8f8'}
          />

          {/* Date / Time */}
          <div style={{marginBottom:'12px',padding:'11px',borderRadius:'12px',background:'#faf8ff',border:'1.5px solid #ede8f8',display:'flex',flexDirection:'column',gap:'8px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
              <span style={{fontSize:'11px',fontWeight:'700',color:'#9090b8',minWidth:'40px'}}>日付</span>
              <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
                style={{flex:1,padding:'7px 10px',borderRadius:'10px',border:'1.5px solid #e0d8f4',fontSize:'14px',color:'#4a3a6a',outline:'none',background:'white'}}
                onFocus={e=>e.target.style.borderColor='#c8a0e8'} onBlur={e=>e.target.style.borderColor='#e0d8f4'}
              />
            </div>
            <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer'}}>
              <div onClick={()=>setAllDay(v=>!v)} style={{width:'20px',height:'20px',borderRadius:'6px',border:`2px solid ${allDay?'#c090e8':'#d8d0f0'}`,background:allDay?'#c090e8':'white',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,transition:'all 0.15s'}}>
                {allDay&&<span style={{color:'white',fontSize:'13px',fontWeight:'900',lineHeight:1}}>✓</span>}
              </div>
              <span style={{fontSize:'13px',fontWeight:'600',color:allDay?'#7040b8':'#a090b8'}}>終日の予定</span>
            </label>
            <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer'}}>
              <div onClick={()=>setMultiDay(v=>!v)} style={{width:'20px',height:'20px',borderRadius:'6px',border:`2px solid ${multiDay?'#6090e0':'#d8d0f0'}`,background:multiDay?'#6090e0':'white',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,transition:'all 0.15s'}}>
                {multiDay&&<span style={{color:'white',fontSize:'13px',fontWeight:'900',lineHeight:1}}>✓</span>}
              </div>
              <span style={{fontSize:'13px',fontWeight:'600',color:multiDay?'#3060b0':'#a090b8'}}>複数日にまたがる</span>
            </label>
            {multiDay && (
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <span style={{fontSize:'11px',fontWeight:'700',color:'#9090b8',minWidth:'40px'}}>終了日</span>
                <input type="date" value={endDate} min={startDate} onChange={e=>setEndDate(e.target.value)}
                  style={{flex:1,padding:'7px 10px',borderRadius:'10px',border:'1.5px solid #e0d8f4',fontSize:'14px',color:'#4a3a6a',outline:'none',background:'white'}}
                  onFocus={e=>e.target.style.borderColor='#c8a0e8'} onBlur={e=>e.target.style.borderColor='#e0d8f4'}
                />
              </div>
            )}
            {!allDay && (
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <div style={{flex:1}}>
                  <p style={{fontSize:'11px',fontWeight:'700',color:'#a090c0',marginBottom:'3px'}}>開始</p>
                  <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)} style={{width:'100%',padding:'7px 10px',borderRadius:'10px',border:'1.5px solid #e0d8f4',fontSize:'14px',color:'#4a3a6a',outline:'none',background:'white'}}
                    onFocus={e=>e.target.style.borderColor='#c8a0e8'} onBlur={e=>e.target.style.borderColor='#e0d8f4'}/>
                </div>
                <span style={{fontSize:'15px',color:'#c0b0e0',marginTop:'13px'}}>〜</span>
                <div style={{flex:1}}>
                  <p style={{fontSize:'11px',fontWeight:'700',color:'#a090c0',marginBottom:'3px'}}>終了</p>
                  <input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)} style={{width:'100%',padding:'7px 10px',borderRadius:'10px',border:'1.5px solid #e0d8f4',fontSize:'14px',color:'#4a3a6a',outline:'none',background:'white'}}
                    onFocus={e=>e.target.style.borderColor='#c8a0e8'} onBlur={e=>e.target.style.borderColor='#e0d8f4'}/>
                </div>
              </div>
            )}
          </div>

          {/* Member */}
          <p style={{fontSize:'12px',fontWeight:'700',color:'#9080b0',marginBottom:'6px'}}>だれの予定？ <span style={{fontSize:'11px',fontWeight:'400',color:'#b0a0c8'}}>（複数選択可）</span></p>
          <div style={{display:'flex',gap:'7px',marginBottom:selMembers.length>1?'6px':'11px',flexWrap:'wrap'}}>
            {members.map(mb=>{
              const p=getPal(members,mb.id); const sel=selMembers.includes(mb.id);
              return (
                <button key={mb.id} type="button" onClick={()=>toggleMember(mb.id)}
                  style={{flex:'1 1 60px',minWidth:'60px',padding:'7px 4px',borderRadius:'12px',border:`2px solid ${sel?p.border:'transparent'}`,background:sel?p.bg:'#f4f0fa',color:sel?p.text:'#a0a0c0',fontSize:'12px',fontWeight:sel?'700':'400',cursor:'pointer',transition:'all 0.15s',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',position:'relative'}}
                >
                  <span style={{fontSize:'17px'}}>{mb.emoji}</span>
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%',padding:'0 2px'}}>{mb.label}</span>
                  {sel&&<span style={{position:'absolute',top:'3px',right:'5px',fontSize:'9px',color:p.text,fontWeight:'900'}}>✓</span>}
                </button>
              );
            })}
          </div>
          {selMembers.length>1 && (
            <p style={{fontSize:'11px',color:'#9080b0',marginBottom:'11px',padding:'5px 10px',background:'#f4f0fa',borderRadius:'8px'}}>
              👥 {selMembers.map(id=>getMb(members,id).label).join('・')} の共有予定
            </p>
          )}

          {/* Category */}
          <p style={{fontSize:'12px',fontWeight:'700',color:'#9080b0',marginBottom:'6px'}}>カテゴリ</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'11px'}}>
            {categories.map(cat=>{
              const sel=category===cat.id;
              return (
                <button key={cat.id} type="button" onClick={()=>setCategory(cat.id)}
                  style={{padding:'5px 10px',borderRadius:'20px',border:`2px solid ${sel?cat.border:'transparent'}`,background:sel?cat.bg:'#f4f0fa',color:sel?cat.text:'#a0a0c0',fontSize:'12px',fontWeight:sel?'600':'400',cursor:'pointer',transition:'all 0.15s'}}
                >{cat.emoji} {cat.label}</button>
              );
            })}
          </div>

          {/* Medical */}
          {isMedical && (
            <div style={{marginBottom:'11px',padding:'13px',borderRadius:'12px',background:'#fff8f0',border:'1.5px solid #ffb86c'}}>
              <p style={{fontSize:'13px',fontWeight:'700',color:'#a05010',marginBottom:'11px'}}>🏥 通院情報</p>
              <div style={{marginBottom:'9px'}}>
                <label style={{fontSize:'11px',fontWeight:'700',color:'#c08050',display:'block',marginBottom:'4px'}}>病院</label>
                <select value={hospital} onChange={e=>setHospital(e.target.value)} style={{...selStyle}} onFocus={e=>e.target.style.borderColor='#ffb86c'} onBlur={e=>e.target.style.borderColor='#e0d8f4'}>
                  <option value="">（選択してください）</option>
                  {hospitals.map(h=><option key={h} value={h}>{h}</option>)}
                </select>
                {hospitals.length===0 && <p style={{fontSize:'11px',color:'#c0a080',marginTop:'4px'}}>⚙️ 設定 → 病院・診察科 から追加できます</p>}
              </div>
              <div style={{marginBottom:'9px'}}>
                <label style={{fontSize:'11px',fontWeight:'700',color:'#c08050',display:'block',marginBottom:'4px'}}>診察科</label>
                <select value={department} onChange={e=>setDepartment(e.target.value)} style={{...selStyle}} onFocus={e=>e.target.style.borderColor='#ffb86c'} onBlur={e=>e.target.style.borderColor='#e0d8f4'}>
                  <option value="">（選択してください）</option>
                  {departments.map(d=><option key={d} value={d}>{d}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:'11px',fontWeight:'700',color:'#c08050',display:'block',marginBottom:'4px'}}>内容・結果</label>
                <textarea value={medResult} onChange={e=>setMedResult(e.target.value)} rows={3} placeholder="診察の内容、検査結果、処方、次回予約など..."
                  style={{width:'100%',padding:'8px 12px',borderRadius:'10px',border:'1.5px solid #e0d8f4',fontSize:'13px',color:'#4a3a6a',outline:'none',resize:'vertical',background:'white',fontFamily:'inherit'}}
                  onFocus={e=>e.target.style.borderColor='#ffb86c'} onBlur={e=>e.target.style.borderColor='#e0d8f4'}
                />
              </div>
            </div>
          )}

          {/* Measurement */}
          {isMeasurement && (
            <div style={{marginBottom:'11px',padding:'13px',borderRadius:'12px',background:'#f0f8ff',border:'1.5px solid #60b8e8'}}>
              <p style={{fontSize:'13px',fontWeight:'700',color:'#1a6090',marginBottom:'11px'}}>📏 身体測定</p>
              <div style={{display:'flex',gap:'12px'}}>
                <div style={{flex:1}}>
                  <label style={{fontSize:'11px',fontWeight:'700',color:'#3080b0',display:'block',marginBottom:'4px'}}>身長（cm）</label>
                  <div style={{position:'relative'}}>
                    <input type="number" value={height} onChange={e=>setHeight(e.target.value)} min={0} max={300} step={0.1} placeholder="例：75.5"
                      style={{width:'100%',padding:'9px 36px 9px 12px',borderRadius:'10px',border:'1.5px solid #a0d0f0',fontSize:'15px',fontWeight:'600',color:'#1a5080',outline:'none',background:'white'}}
                      onFocus={e=>e.target.style.borderColor='#60b8e8'} onBlur={e=>e.target.style.borderColor='#a0d0f0'}
                    />
                    <span style={{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',fontSize:'12px',color:'#6090b0',pointerEvents:'none'}}>cm</span>
                  </div>
                </div>
                <div style={{flex:1}}>
                  <label style={{fontSize:'11px',fontWeight:'700',color:'#3080b0',display:'block',marginBottom:'4px'}}>体重（kg）</label>
                  <div style={{position:'relative'}}>
                    <input type="number" value={weight} onChange={e=>setWeight(e.target.value)} min={0} max={500} step={0.1} placeholder="例：9.8"
                      style={{width:'100%',padding:'9px 36px 9px 12px',borderRadius:'10px',border:'1.5px solid #a0d0f0',fontSize:'15px',fontWeight:'600',color:'#1a5080',outline:'none',background:'white'}}
                      onFocus={e=>e.target.style.borderColor='#60b8e8'} onBlur={e=>e.target.style.borderColor='#a0d0f0'}
                    />
                    <span style={{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',fontSize:'12px',color:'#6090b0',pointerEvents:'none'}}>kg</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Body Condition */}
          {isCondition && (
            <div style={{marginBottom:'11px',padding:'13px',borderRadius:'12px',background:'#fff4f0',border:'1.5px solid #e89070'}}>
              <p style={{fontSize:'13px',fontWeight:'700',color:'#903020',marginBottom:'9px'}}>🌡️ 体調の記録</p>
              <label style={{fontSize:'11px',fontWeight:'700',color:'#b05040',display:'block',marginBottom:'6px'}}>不調の詳細</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'9px'}}>
                {['発熱','鼻水','咳','頭痛','腹痛','嘔吐','下痢','倦怠感','食欲不振','発疹','耳の痛み','のどの痛み'].map(sym=>(
                  <button key={sym} type="button"
                    onClick={()=>setConditionDetail(p=>p.includes(sym)?p.replace(sym,'').replace(/[・\n]+/g,s=>s==='・'?'':s).trim():p?(p+'・'+sym):sym)}
                    style={{padding:'4px 9px',borderRadius:'16px',border:`1.5px solid ${conditionDetail.includes(sym)?'#e89070':'#e0c8b8'}`,background:conditionDetail.includes(sym)?'#fce4d8':'white',color:conditionDetail.includes(sym)?'#903020':'#b09080',fontSize:'12px',cursor:'pointer',transition:'all 0.15s'}}
                  >{sym}</button>
                ))}
              </div>
              <textarea value={conditionDetail} onChange={e=>setConditionDetail(e.target.value)} rows={3}
                placeholder="症状の詳細、体温、気になること など…"
                style={{width:'100%',padding:'8px 12px',borderRadius:'10px',border:'1.5px solid #e0c0b0',fontSize:'13px',color:'#4a3a6a',outline:'none',resize:'vertical',background:'white',fontFamily:'inherit'}}
                onFocus={e=>e.target.style.borderColor='#e89070'} onBlur={e=>e.target.style.borderColor='#e0c0b0'}
              />
            </div>
          )}

          {/* Memo */}
          <textarea placeholder="メモ（任意）" value={memo} onChange={e=>setMemo(e.target.value)} rows={2}
            style={{width:'100%',padding:'9px 13px',borderRadius:'12px',border:'2px solid #ede8f8',fontSize:'14px',color:'#4a3a6a',outline:'none',resize:'none',marginBottom:'14px',background:'#faf8ff',fontFamily:'inherit'}}
            onFocus={e=>e.target.style.borderColor='#c8a0e8'} onBlur={e=>e.target.style.borderColor='#ede8f8'}
          />

          <div style={{display:'flex',gap:'10px'}}>
            <button type="button" onClick={onClose} style={{flex:1,padding:'12px',borderRadius:'12px',border:'2px solid #ede8f8',background:'white',color:'#a090c0',fontSize:'14px',fontWeight:'600',cursor:'pointer'}}>キャンセル</button>
            <button type="submit" className="save-btn" disabled={!title.trim()}
              style={{flex:2,padding:'12px',borderRadius:'12px',border:'none',background:title.trim()?`linear-gradient(135deg,${pal.accent},${pal.border})`:'#e8d8f0',color:title.trim()?'white':'#c0b0d8',fontSize:'14px',fontWeight:'700',cursor:title.trim()?'pointer':'default',transition:'all 0.2s',boxShadow:title.trim()?`0 4px 14px ${pal.border}88`:'none'}}
            >{isEdit?'💾 保存する':'✚ 追加する'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ═══════════════════════ DETAIL POPUP ═══════════════════════ */
function DayDetailPopup({ date, events, members, categories, filterMember, onAdd, onEdit, onCopy, onDelete, onClose }) {
  const [,m,d]=[...date.split('-')];
  const wday=WEEKDAYS[new Date(...date.split('-').map((v,i)=>i===1?+v-1:+v)).getDay()];
  const visible=filterMember==='all'?events:events.filter(e=>evMembers(e).includes(filterMember));
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:999,background:'rgba(180,160,220,0.2)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:'20px',padding:'22px',width:'100%',maxWidth:'420px',boxShadow:'0 16px 48px rgba(140,100,200,0.2)',animation:'slideUp 0.2s ease',maxHeight:'80vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
          <h3 style={{fontSize:'16px',fontWeight:'700',color:'#4a3a6a'}}>📅 {+m}月{+d}日（{wday}）</h3>
          <button onClick={onClose} style={{background:'#f0ecfa',border:'none',borderRadius:'50%',width:'28px',height:'28px',cursor:'pointer',fontSize:'14px',color:'#9080b0'}}>✕</button>
        </div>
        {visible.length===0 ? (
          <p style={{color:'#c0b8d8',textAlign:'center',padding:'18px 0',fontSize:'14px'}}>予定はありません</p>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'12px'}}>
            {visible.map(ev=>{
              const mbs=evMembers(ev).map(id=>getMb(members,id)); const cat=getCat(categories,ev.category);
              const hasMed=ev.hospital||ev.department||ev.medResult;
              const hasMeas=ev.height||ev.weight;
              const hasCond=ev.conditionDetail;
              return (
                <div key={ev.id} style={{borderRadius:'12px',background:cat.bg,border:`1px solid ${cat.border}`,overflow:'hidden'}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:'8px',padding:'10px 12px'}}>
                    <div style={{display:'flex',flexDirection:'column',gap:'2px',flexShrink:0}}>
                      {mbs.map(mb=>{const pal=getPal(members,mb.id);return <div key={mb.id} style={{width:'24px',height:'24px',borderRadius:'50%',background:pal.bg,border:`1.5px solid ${pal.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px'}}>{mb.emoji}</div>;})}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontSize:'14px',fontWeight:'700',color:cat.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.title}</p>
                      <p style={{fontSize:'11px',color:cat.text,opacity:0.75,marginTop:'2px'}}>
                        {mbs.map(mb=>mb.label).join('・')} · {cat.emoji} {cat.label} · <b>{timeLabel(ev)}</b>
                        {isMultiD(ev)&&<> · <b>〜{fmtDate(ev.endDate)}</b></>}
                      </p>
                      {ev.memo&&<p style={{fontSize:'11px',color:'#a0a0b8',marginTop:'2px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.memo}</p>}
                    </div>
                    <div style={{display:'flex',gap:'4px',flexShrink:0}}>
                      <button onClick={()=>onCopy(ev)} style={{background:'rgba(255,255,255,0.7)',border:'none',borderRadius:'6px',padding:'4px 7px',cursor:'pointer',fontSize:'11px',color:'#7060b0'}}>📋</button>
                      <button onClick={()=>onEdit(ev)} style={{background:'white',border:'none',borderRadius:'6px',padding:'4px 7px',cursor:'pointer',fontSize:'11px',color:cat.text,opacity:0.8}}>編集</button>
                      <button onClick={()=>onDelete(ev.id)} style={{background:'rgba(255,255,255,0.7)',border:'none',borderRadius:'6px',padding:'4px 7px',cursor:'pointer',fontSize:'11px',color:'#c06060'}}>削除</button>
                    </div>
                  </div>
                  {hasMed && (
                    <div style={{padding:'8px 12px 10px',borderTop:`1px dashed ${cat.border}`,background:'rgba(255,248,240,0.7)'}}>
                      <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:ev.medResult?'6px':0}}>
                        {ev.hospital&&<span style={{fontSize:'12px',padding:'2px 9px',borderRadius:'10px',background:'#ffe8cc',color:'#a05010',fontWeight:'600'}}>🏥 {ev.hospital}</span>}
                        {ev.department&&<span style={{fontSize:'12px',padding:'2px 9px',borderRadius:'10px',background:'#fff4cc',color:'#907020',fontWeight:'600'}}>🩺 {ev.department}</span>}
                      </div>
                      {ev.medResult&&<p style={{fontSize:'12px',color:'#806040',lineHeight:1.5,whiteSpace:'pre-wrap'}}>{ev.medResult}</p>}
                    </div>
                  )}
                  {hasMeas && (
                    <div style={{padding:'8px 12px 10px',borderTop:`1px dashed ${cat.border}`,background:'rgba(240,248,255,0.8)'}}>
                      <div style={{display:'flex',gap:'10px'}}>
                        {ev.height&&<span style={{fontSize:'13px',fontWeight:'700',color:'#1a6090'}}>📏 {ev.height} cm</span>}
                        {ev.weight&&<span style={{fontSize:'13px',fontWeight:'700',color:'#1a6090'}}>⚖️ {ev.weight} kg</span>}
                      </div>
                    </div>
                  )}
                  {hasCond && (
                    <div style={{padding:'8px 12px 10px',borderTop:`1px dashed ${cat.border}`,background:'rgba(255,244,240,0.8)'}}>
                      <p style={{fontSize:'12px',color:'#803020',lineHeight:1.5,whiteSpace:'pre-wrap'}}>🌡️ {ev.conditionDetail}</p>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
        <button onClick={onAdd} style={{width:'100%',padding:'11px',borderRadius:'12px',border:'none',background:'linear-gradient(135deg,#e8b8d8,#c8a0e8)',color:'white',fontSize:'14px',fontWeight:'700',cursor:'pointer',boxShadow:'0 4px 14px rgba(200,140,220,0.35)'}}>✚ 予定を追加する</button>
      </div>
    </div>
  );
}

/* ═══════════════════════ MEDICAL HISTORY PAGE ═══════════════════════ */
function MedicalPage({ events, members, categories, filterMember }) {
  const medDef=categories.filter(c=>c.medical).map(c=>c.id);
  const [catFilter,setCatFilter]=useState(medDef.length>0?medDef:categories.map(c=>c.id));
  const [sortAsc,setSortAsc]=useState(false);
  const toggleCat=id=>setCatFilter(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const filtered=useMemo(()=>events.filter(ev=>(filterMember==='all'||evMembers(ev).includes(filterMember))&&catFilter.includes(ev.category)).sort((a,b)=>sortAsc?a.date.localeCompare(b.date):b.date.localeCompare(a.date)),[events,filterMember,catFilter,sortAsc]);
  const grouped=useMemo(()=>{const map={};filtered.forEach(ev=>{const k=ev.date.slice(0,7);if(!map[k])map[k]=[];map[k].push(ev);});return Object.entries(map).sort((a,b)=>sortAsc?a[0].localeCompare(b[0]):b[0].localeCompare(a[0]));
  },[filtered,sortAsc]);
  const ty=String(todayObj.getFullYear()),tm=`${ty}-${String(todayObj.getMonth()+1).padStart(2,'0')}`;
  const yc=filtered.filter(e=>e.date.startsWith(ty)).length,mc=filtered.filter(e=>e.date.startsWith(tm)).length;
  return (
    <div>
      <div style={{display:'flex',gap:'9px',marginBottom:'13px',flexWrap:'wrap'}}>
        {[{label:'今月',val:mc,emoji:'📅',bg:'#ffe8cc',border:'#ffb86c',text:'#a05010'},{label:`${ty}年`,val:yc,emoji:'📋',bg:'#e8d8fc',border:'#c090e8',text:'#5a30a0'},{label:'表示中合計',val:filtered.length,emoji:'📊',bg:'#d4f5e0',border:'#80d8a8',text:'#2e8a52'}].map(s=>(
          <div key={s.label} style={{flex:1,minWidth:'100px',padding:'12px',borderRadius:'14px',background:s.bg,border:`1px solid ${s.border}`,textAlign:'center'}}>
            <p style={{fontSize:'20px',marginBottom:'3px'}}>{s.emoji}</p>
            <p style={{fontSize:'24px',fontWeight:'800',color:s.text,lineHeight:1}}>{s.val}</p>
            <p style={{fontSize:'11px',color:s.text,opacity:0.8,marginTop:'3px'}}>{s.label}</p>
          </div>
        ))}
      </div>
      <div style={{marginBottom:'12px',padding:'11px 13px',background:'white',borderRadius:'16px',boxShadow:'0 4px 16px rgba(180,140,220,0.08)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'7px'}}>
          <p style={{fontSize:'12px',fontWeight:'700',color:'#c0b0d8'}}>カテゴリフィルター</p>
          <button onClick={()=>setSortAsc(v=>!v)} style={{padding:'4px 10px',borderRadius:'8px',border:'1.5px solid #e0d8f4',background:'white',fontSize:'12px',fontWeight:'600',color:'#9080b0',cursor:'pointer'}}>{sortAsc?'↑ 古い順':'↓ 新しい順'}</button>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
          {categories.map(cat=>{const sel=catFilter.includes(cat.id);return <button key={cat.id} onClick={()=>toggleCat(cat.id)} style={{padding:'5px 10px',borderRadius:'20px',border:`2px solid ${sel?cat.border:'transparent'}`,background:sel?cat.bg:'#f4f0fa',color:sel?cat.text:'#a0a0c0',fontSize:'12px',fontWeight:sel?'600':'400',cursor:'pointer',transition:'all 0.15s'}}>{cat.emoji} {cat.label}</button>;})}
        </div>
      </div>
      {grouped.length===0 ? (
        <div style={{textAlign:'center',padding:'50px 20px',color:'#c0b0d8'}}><p style={{fontSize:'38px',marginBottom:'10px'}}>📋</p><p style={{fontSize:'15px'}}>表示する履歴がありません</p></div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
          {grouped.map(([ym,evs])=>{
            const [y2,m2]=ym.split('-');
            return (
              <div key={ym}>
                <h3 style={{fontSize:'14px',fontWeight:'700',color:'#9080b0',marginBottom:'8px',paddingLeft:'4px'}}>📅 {y2}年 {+m2}月 <span style={{fontSize:'12px',opacity:0.7}}>（{evs.length}件）</span></h3>
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {evs.map(ev=>{
                    const mbs=evMembers(ev).map(id=>getMb(members,id)); const cat=getCat(categories,ev.category);
                    const [ey,em,ed]=ev.date.split('-'); const wday=WEEKDAYS[new Date(+ey,+em-1,+ed).getDay()];
                    const hasMed=ev.hospital||ev.department||ev.medResult;
                    return (
                      <div key={ev.id} className="list-row" style={{borderRadius:'14px',background:'white',border:`1.5px solid ${cat.border}`,boxShadow:'0 2px 8px rgba(180,140,220,0.07)',transition:'all 0.15s',overflow:'hidden'}}>
                        <div style={{display:'flex',gap:'11px',padding:'12px 14px'}}>
                          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minWidth:'42px',padding:'6px',background:cat.bg,borderRadius:'10px',flexShrink:0}}>
                            <span style={{fontSize:'10px',fontWeight:'700',color:cat.text}}>{+em}月</span>
                            <span style={{fontSize:'20px',fontWeight:'800',color:cat.text,lineHeight:1.1}}>{+ed}</span>
                            <span style={{fontSize:'10px',color:cat.text,opacity:0.7}}>{wday}</span>
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:'flex',alignItems:'center',gap:'5px',marginBottom:'4px'}}>
                              {mbs.map(mb=>{const pal=getPal(members,mb.id);return <div key={mb.id} style={{width:'20px',height:'20px',borderRadius:'50%',background:pal.bg,border:`1.5px solid ${pal.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',flexShrink:0}}>{mb.emoji}</div>;})}
                              <span style={{fontSize:'15px',fontWeight:'700',color:'#3a3a5a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.title}</span>
                            </div>
                            <div style={{display:'flex',flexWrap:'wrap',gap:'5px',alignItems:'center'}}>
                              <span style={{fontSize:'11px',padding:'2px 8px',borderRadius:'10px',background:cat.bg,color:cat.text,fontWeight:'600'}}>{cat.emoji} {cat.label}</span>
                              <span style={{fontSize:'11px',color:'#a0a0b8',fontWeight:'600'}}>{timeLabel(ev)}</span>
                              {isMultiD(ev)&&<span style={{fontSize:'11px',color:'#7090c0',fontWeight:'600'}}>〜{fmtDate(ev.endDate)}</span>}
                              <span style={{fontSize:'11px',color:'#b0a0c8'}}>{mbs.map(mb=>mb.label).join('・')}</span>
                            </div>
                            {ev.memo&&<p style={{fontSize:'12px',color:'#8898b0',marginTop:'4px'}}>💬 {ev.memo}</p>}
                          </div>
                        </div>
                        {hasMed&&(
                          <div style={{padding:'9px 14px 11px',borderTop:`1px dashed ${cat.border}`,background:'#fff8f0'}}>
                            <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:ev.medResult?'7px':0}}>
                              {ev.hospital&&<span style={{fontSize:'12px',padding:'3px 10px',borderRadius:'10px',background:'#ffe8cc',color:'#a05010',fontWeight:'700'}}>🏥 {ev.hospital}</span>}

                            </div>

                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════ MEASUREMENT CHART ═══════════════════════ */
function MeasChart({ data }) {
  const [hovered, setHovered] = useState(null);
  if (!data || data.length === 0) return null;

  const W = 500, H = 230;
  const pad = { l:48, r:48, t:28, b:46 };
  const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;

  const pts = data.map(d=>({
    date: d.date,
    label: fmtDate(d.date),
    h: d.height ? parseFloat(d.height) : null,
    w: d.weight  ? parseFloat(d.weight)  : null,
  }));

  const hs = pts.map(p=>p.h).filter(v=>v!==null);
  const ws = pts.map(p=>p.w).filter(v=>v!==null);
  const hasH = hs.length > 0, hasW = ws.length > 0;

  // スケール（上下に余白追加）
  const hRng = hasH ? [Math.min(...hs), Math.max(...hs)] : [0,1];
  const wRng = hasW ? [Math.min(...ws), Math.max(...ws)] : [0,1];
  const hPd  = Math.max((hRng[1]-hRng[0])*0.12, 1.5);
  const wPd  = Math.max((wRng[1]-wRng[0])*0.12, 0.3);
  const hMin = hRng[0]-hPd, hMax = hRng[1]+hPd;
  const wMin = wRng[0]-wPd, wMax = wRng[1]+wPd;

  const n = pts.length;
  const xOf  = i => pad.l + (n>1 ? (i/(n-1))*cW : cW/2);
  const yOfH = v => pad.t + cH - ((v-hMin)/(hMax-hMin))*cH;
  const yOfW = v => pad.t + cH - ((v-wMin)/(wMax-wMin))*cH;

  // ポリラインのpoints文字列を各データが存在するセグメントごとに生成
  const buildSegments = (getter) => {
    const segs = []; let cur = [];
    pts.forEach((p,i)=>{ const v=getter(p); if(v!==null){cur.push(`${xOf(i)},${v}`);} else if(cur.length){segs.push(cur.join(' '));cur=[];} });
    if(cur.length) segs.push(cur.join(' '));
    return segs;
  };
  const hSegs = hasH ? buildSegments(p=>p.h!==null?yOfH(p.h):null) : [];
  const wSegs = hasW ? buildSegments(p=>p.w!==null?yOfW(p.w):null) : [];

  // Y軸目盛（3本）
  const yTicks = [0, 0.5, 1];

  return (
    <div style={{background:'white',borderRadius:'16px',padding:'16px 16px 10px',boxShadow:'0 4px 16px rgba(180,140,220,0.09)',marginBottom:'13px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px',flexWrap:'wrap',gap:'8px'}}>
        <p style={{fontSize:'13px',fontWeight:'800',color:'#4a3a6a'}}>📈 成長グラフ</p>
        <div style={{display:'flex',gap:'12px',flexWrap:'wrap'}}>
          {hasH&&<div style={{display:'flex',alignItems:'center',gap:'5px'}}><svg width="22" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="#2080c0" strokeWidth="2.5" strokeLinecap="round"/><circle cx="11" cy="5" r="3.5" fill="white" stroke="#2080c0" strokeWidth="2"/></svg><span style={{fontSize:'11px',color:'#2080c0',fontWeight:'700'}}>身長 cm</span></div>}
          {hasW&&<div style={{display:'flex',alignItems:'center',gap:'5px'}}><svg width="22" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="#20a060" strokeWidth="2.5" strokeLinecap="round"/><circle cx="11" cy="5" r="3.5" fill="white" stroke="#20a060" strokeWidth="2"/></svg><span style={{fontSize:'11px',color:'#20a060',fontWeight:'700'}}>体重 kg</span></div>}
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',overflow:'visible',display:'block'}}>
        {/* グリッド */}
        {yTicks.map((t,i)=>(
          <line key={i} x1={pad.l} y1={pad.t+cH*t} x2={pad.l+cW} y2={pad.t+cH*t} stroke='#f0ecf8' strokeWidth='1'/>
        ))}
        {/* 左Y軸ラベル（身長） */}
        {hasH && yTicks.map((t,i)=>{
          const v = hMax - t*(hMax-hMin);
          return <text key={i} x={pad.l-6} y={pad.t+cH*t+4} textAnchor='end' fill='#2080c0' fontSize='10' fontWeight='600'>{v.toFixed(v>=10?1:2)}</text>;
        })}
        {/* 右Y軸ラベル（体重） */}
        {hasW && yTicks.map((t,i)=>{
          const v = wMax - t*(wMax-wMin);
          return <text key={i} x={pad.l+cW+6} y={pad.t+cH*t+4} textAnchor='start' fill='#20a060' fontSize='10' fontWeight='600'>{v.toFixed(1)}</text>;
        })}
        {/* 身長折れ線 */}
        {hSegs.map((seg,i)=><polyline key={i} points={seg} fill='none' stroke='#2080c0' strokeWidth='2.5' strokeLinejoin='round' strokeLinecap='round'/>)}
        {/* 体重折れ線 */}
        {wSegs.map((seg,i)=><polyline key={i} points={seg} fill='none' stroke='#20a060' strokeWidth='2.5' strokeLinejoin='round' strokeLinecap='round'/>)}
        {/* データ点 */}
        {pts.map((p,i)=>(
          <g key={i} style={{cursor:'pointer'}}
            onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
            onTouchStart={()=>setHovered(i)} onTouchEnd={()=>setTimeout(()=>setHovered(null),1500)}>
            {p.h!==null&&<circle cx={xOf(i)} cy={yOfH(p.h)} r={hovered===i?6:4} fill='white' stroke='#2080c0' strokeWidth='2.5' style={{transition:'r 0.1s'}}/>}
            {p.w!==null&&<circle cx={xOf(i)} cy={yOfW(p.w)} r={hovered===i?6:4} fill='white' stroke='#20a060' strokeWidth='2.5' style={{transition:'r 0.1s'}}/>}
            <rect x={xOf(i)-22} y={pad.t} width={44} height={cH} fill='transparent'/>
          </g>
        ))}
        {/* ツールチップ */}
        {hovered!==null&&(()=>{
          const p=pts[hovered]; const x=xOf(hovered);
          const rows=[p.label, p.h!==null?`📏 ${p.h} cm`:null, p.w!==null?`⚖️ ${p.w} kg`:null].filter(Boolean);
          const bh=rows.length*16+10; const bw=88;
          const tx=Math.min(Math.max(x-bw/2, pad.l), W-pad.r-bw);
          const ty=pad.t+4;
          return (
            <g>
              <line x1={x} y1={pad.t} x2={x} y2={pad.t+cH} stroke='#c8b8e8' strokeWidth='1' strokeDasharray='4,3'/>
              <rect x={tx} y={ty} width={bw} height={bh} rx={7} fill='#3a2a5a' opacity={0.92}/>
              {rows.map((row,ri)=>(
                <text key={ri} x={tx+8} y={ty+16+ri*16} fill={ri===0?'#e8d8fc':ri===1?'#90ccff':'#80ffb0'} fontSize='11' fontWeight={ri===0?'700':'500'}>{row}</text>
              ))}
            </g>
          );
        })()}
        {/* X軸ラベル */}
        {pts.map((p,i)=>(
          <text key={i} x={xOf(i)} y={H-pad.b+16} textAnchor='middle' fill='#9080b0' fontSize='10' fontWeight='500'>
            {p.date.slice(5).replace('-','/')}
          </text>
        ))}
        {/* 軸線 */}
        <line x1={pad.l} y1={pad.t} x2={pad.l} y2={pad.t+cH} stroke='#d8d0f0' strokeWidth='1'/>
        <line x1={pad.l} y1={pad.t+cH} x2={pad.l+cW} y2={pad.t+cH} stroke='#d8d0f0' strokeWidth='1'/>
        <line x1={pad.l+cW} y1={pad.t} x2={pad.l+cW} y2={pad.t+cH} stroke='#d8d0f0' strokeWidth='1'/>
      </svg>
      {n===1&&<p style={{fontSize:'11px',color:'#c0b0d8',textAlign:'center',marginTop:'4px'}}>💡 データが2件以上になるとグラフが繋がります</p>}
    </div>
  );
}

    const first=new Date(year,month,1).getDay(),days=new Date(year,month+1,0).getDate(),cells=[];
